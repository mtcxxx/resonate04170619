<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }

<body class="bg-gray-100 font-sans">
  <div class="container mx-auto p-4 max-w-2xl">
    <h1 class="text-3xl font-bold mb-4 text-center">YouTube Playlist Shuffler</h1>
    
    <!-- Login Section -->

      <button id="signInButton" class="bg-blue-500 text-white px-6 py-2 rounded hover:bg-blue-600">

      </div>
      <button id="shuffleButton" class="bg-green-500 text-white px-6 py-2 rounded hover:bg-green-600 w-full">
        Shuffle and Play
      </button>
    </div>

    <!-- User Playlists -->
    <div id="userPlaylists" class="hidden mt-6">

      <p id="currentVideo" class="text-gray-700"></p>

  <script>
    const CLIENT_ID = '1065557087910-rkho57t9je815a1nfqf0dh8iubekt6vs.apps.googleusercontent.com';
    const API_KEY = 'AIzaSyAKdbPUWShblHh1en0HVRDMrelx6vi6OVg';
    const DISCOVERY_DOCS = ["https://www.googleapis.com/discovery/v1/apis/youtube/v3/rest"];
    const SCOPES = 'https://www.googleapis.com/auth/youtube.readonly';
    const REDIRECT_URI = window.location.hostname === 'localhost' ? 'http://localhost:8080' : window.location.origin;

    let gapiLoaded = false;
    let tokenClient;

    function loadGapi() {
      gapi.load('client', async () => {
        await gapi.client.init({
          apiKey: API_KEY,
          discoveryDocs: DISCOVERY_DOCS,
        });
        gapiLoaded = true;
      });
    }

    function initTokenClient() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        redirect_uri: REDIRECT_URI,
        callback: (response) => {
          if (response.access_token) {
            gapi.client.setToken({ access_token: response.access_token });
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('playlistSection').classList.remove('hidden');
            document.getElementById('userPlaylists').classList.remove('hidden');
            loadUserPlaylists();
          } else if (response.error) {
            console.error('OAuth error:', response.error);
            alert('Authentication failed. Please try again.');
          }
        },
      });
    }

    async function loadUserPlaylists() {
      if (!gapiLoaded) return;
      try {
        const response = await gapi.client.youtube.playlists.list({
          part: 'snippet',
          mine: true,
          maxResults: 25
        });
        const playlists = response.result.items;
        const playlistList = document.getElementById('playlistList');
        playlistList.innerHTML = '';
        playlists.forEach(playlist => {
          const li = document.createElement('li');
          li.className = 'bg-white p-3 rounded shadow cursor-pointer hover:bg-gray-50';
          li.textContent = playlist.snippet.title;
          li.onclick = () => shufflePlaylist(playlist.id);
          playlistList.appendChild(li);
        });
      } catch (error) {
        console.error('Error loading playlists:', error);
        alert('Error loading playlists. Please check your authentication or try again.');
      }
    }

    async function shufflePlaylist(playlistId) {
      if (!gapiLoaded) return;
      try {
        const response = await gapi.client.youtube.playlistItems.list({
          part: 'snippet',
          playlistId: playlistId,
          maxResults: 50
        });
        const videos = response.result.items;
        if (videos.length === 0) {
          alert('No videos found in this playlist.');
          return;
        }
        for (let i = videos.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [videos[i], videos[j]] = [videos[j], videos[i]];
        }
        const videoId = videos[0].snippet.resourceId.videoId;
        window.open(`https://www.youtube.com/watch?v=${videoId}`, '_blank');
        document.getElementById('nowPlaying').classList.remove('hidden');
        document.getElementById('currentVideo').textContent = videos[0].snippet.title;
      } catch (error) {
        console.error('Error fetching playlist items:', error);
        alert('Error fetching playlist. Please check the Playlist ID or try again.');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('signInButton').addEventListener('click', () => {
        tokenClient.requestAccessToken();
      });

      document.getElementById('shuffleButton').addEventListener('click', () => {
        const playlistId = document.getElementById('playlistId').value.trim();
        if (playlistId) {
          shufflePlaylist(playlistId);
        } else {
          alert('Please enter a valid Playlist ID.');
        }
      });
    });

    const script = document.createElement('script');
    script.src = 'https://accounts.google.com/gsi/client';
    script.onload = () => {
      initTokenClient();
      loadGapi();
    };
    document.head.appendChild(script);
  </script>
